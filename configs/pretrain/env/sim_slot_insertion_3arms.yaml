# @package _global_

dataset_repo_id: iantc104/gv_sim_slot_insertion_3arms   # 通过id去huggingface下载数据集
fps: 25

eval:
  # `use_async_envs` specifies whether to use asynchronous environments (multiprocessing).
  # set it to false to avoid some problems of the aloha env
  use_async_envs: false

env:
  name: sim_envs
  task: SlotInsertion-3Arms-v0
  state_dim: 21
  action_dim: 21
  fps: ${fps}
  episode_length: 300

wandb:
  project: ${env.task}_finetune