# @package _global_
# 冻结预训练 Diffusion，只训练最终动作后处理 MLP 的调试配置。
# 可用命令查看最终合并结果:
# python train/finetune/test_finetune.py --cfg job

seed: 1000
dataset_repo_id: "dppo_online_rollout"

env:
  name: guided_vision
  task: SewNeedle-2Arms-v0
  # 调试建议先用单环境，确认 MLP/PPO 链路无误后再改成 5。
  n_envs: 1

training:
  # 预训练 Diffusion 权重目录；运行前按你的真实路径修改。
  pretrained_ckpt_path: "outputs/1_hugging_model/pre_sim_sew_needle_2arms_wrist_diffusion"

  # Critic 预热期间只训练 Critic，不更新后置 MLP。
  n_critic_warmup_itr: 5

  # RL 训练步数与采样规模。单环境 rollout_steps=400 约等于原 5 环境 * 80 chunk 的总样本量。
  n_train_itr: 1000
  rollout_steps: 400
  batch_size: 16
  update_epochs: 2

  # 后置 MLP 是唯一被 PPO 更新的 actor 部分，可以比直接微调 Diffusion 稍大一点。
  actor_lr: 1e-5
  critic_lr: 3e-4
  weight_decay: 1e-6
  actor_lr_warmup_iters: 5

  # PPO / GAE 参数。
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.08
  target_kl: 0.03
  grad_accumulate: 4
  reward_ema_alpha: 0.05

  # Frozen Diffusion + MLP 的动作分布参数。
  # MLP 输入/输出维度均为 action_dim；residual=true 时初始输出等价于预训练 Diffusion 动作。
  action_mlp_hidden_dim: 512
  action_mlp_depth: 2
  action_mlp_residual: true
  action_mlp_residual_scale: 1.0
  action_mlp_std: 0.02
  action_mlp_learn_std: true
  logprob_reduction: sum

  # 调试开关。
  use_disk_cache: false
  skip_update: false
  update_actor: true

  # 防止后置 MLP 初期过度偏离 Diffusion 输出；设为 0 则关闭。
  bc_loss_coef: 0.0

  # 评估崩溃回滚。
  rollback_on_eval_collapse: true
  rollback_success_rate: 0.1
  rollback_reward: -100.0
  rollback_patience: 1

eval:
  eval_freq: 2
  render_camera: ['overhead_cam']
  checkpoint_metric: "reward"
  max_checkpoints: 20
  n_episodes: 20
  max_episodes_rendered: 1
  records_resume: true
  fps: 25

policy:
  name: diffusion
  n_action_steps: 8
  # 该脚本不再训练去噪链，保留字段是为了兼容旧配置/日志。
  ft_denoising_steps: 10
